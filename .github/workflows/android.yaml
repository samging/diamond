name: android test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-linux:
    name: Test (Linux / native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: build
        run: cargo build --release

      - name: test
        run: cargo test -- --nocapture

  test-termux:
    name: Test (Android aarch64 / Termux-like)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust aarch64-linux-android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Configure cargo for Android cross-compile
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-linux-android]
          linker = "${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang"
          EOF

      - name: Build for aarch64-linux-android (Termux target)
        run: cargo build --target aarch64-linux-android --release

      - name: Run tests in Termux environment (via QEMU)
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          install: |
            apt-get update -q
            apt-get install -y curl build-essential pkg-config libssl-dev
            curl https://sh.rustup.rs -sSf | sh -s -- -y
            source "$HOME/.cargo/env"
          run: |
            source "$HOME/.cargo/env"
            cargo test -- --nocapture
